name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install client deps
        working-directory: client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: server
        run: npm install --ignore-scripts

      - name: Audit client prod deps (bloquant)
        working-directory: client
        run: |
          npm audit --json --omit=dev --audit-level=high > audit-prod.json 2>/dev/null || true
          node -e "
            const r = require('./audit-prod.json');
            const m = r.metadata?.vulnerabilities || {};
            if (m.critical > 0 || m.high > 0)
              console.log(\`::error::Client prod deps - \${m.critical || 0} critical, \${m.high || 0} high vulnerabilities found - run 'npm audit' for details\`);
            if (m.critical > 0 || m.high > 0) process.exit(1);
          "

      - name: Audit server prod deps (bloquant)
        working-directory: server
        run: |
          npm audit --json --omit=dev --audit-level=high > audit-prod.json 2>/dev/null || true
          node -e "
            const r = require('./audit-prod.json');
            const m = r.metadata?.vulnerabilities || {};
            if (m.critical > 0 || m.high > 0)
              console.log(\`::error::Server prod deps - \${m.critical || 0} critical, \${m.high || 0} high vulnerabilities found - run 'npm audit' for details\`);
            if (m.critical > 0 || m.high > 0) process.exit(1);
          "

      - name: Audit client dev deps (informatif)
        working-directory: client
        run: |
          npm audit --json --audit-level=high > audit.json 2>/dev/null || true
          node -e "
            const r = require('./audit.json');
            const m = r.metadata?.vulnerabilities || {};
            if (m.critical > 0 || m.high > 0)
              console.log(\`::warning::Client dev deps - \${m.critical || 0} critical, \${m.high || 0} high vulnerabilities found - run 'npm audit' for details\`);
          " || true

      - name: Audit server dev deps (informatif)
        working-directory: server
        run: |
          npm audit --json --audit-level=high > audit.json 2>/dev/null || true
          node -e "
            const r = require('./audit.json');
            const m = r.metadata?.vulnerabilities || {};
            if (m.critical > 0 || m.high > 0)
              console.log(\`::warning::Server dev deps - \${m.critical || 0} critical, \${m.high || 0} high vulnerabilities found - run 'npm audit' for details\`);
          " || true

      - name: Outdated client (informatif)
        working-directory: client
        run: |
          npm outdated --json > outdated.json 2>/dev/null || true
          node -e "
            const r = require('./outdated.json');
            const count = Object.keys(r).length;
            if (count > 0)
              console.log(\`::warning::Client - \${count} outdated package(s) - run 'npm outdated' for details\`);
          " || true

      - name: Outdated server (informatif)
        working-directory: server
        run: |
          npm outdated --json > outdated.json 2>/dev/null || true
          node -e "
            const r = require('./outdated.json');
            const count = Object.keys(r).length;
            if (count > 0)
              console.log(\`::warning::Server - \${count} outdated package(s) - run 'npm outdated' for details\`);
          " || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install client deps
        working-directory: client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: server
        run: npm install --ignore-scripts

      - name: Test client
        working-directory: client
        run: npm test -- --run

      - name: Test server
        working-directory: server
        run: npm test -- --run

  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Build images
        run: docker compose build

      - name: Save images
        run: |
          docker save p7-p7-client -o client-image.tar
          docker save p7-p7-server -o server-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: "*.tar"
          retention-days: 1

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images
        run: |
          docker load -i client-image.tar
          docker load -i server-image.tar

      - name: Scan client image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: p7-p7-client
          exit-code: 0
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-client.sarif

      - name: Scan server image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: p7-p7-server
          exit-code: 0
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-server.sarif

      - name: Upload Trivy client results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-client.sarif
          category: trivy-client

      - name: Upload Trivy server results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-server.sarif
          category: trivy-server

      - name: Check vulnerabilities
        run: |
          node -e "
            const client = require('./trivy-client.sarif');
            const server = require('./trivy-server.sarif');
            const count = r => r.runs?.[0]?.results?.length || 0;
            const cc = count(client), sc = count(server);
            if (cc > 0) console.log(\`::error::Client image - \${cc} vulnerability(ies) found - check Security tab for details\`);
            if (sc > 0) console.log(\`::error::Server image - \${sc} vulnerability(ies) found - check Security tab for details\`);
            if (cc > 0 || sc > 0) process.exit(1);
          "
