name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install client deps
        working-directory: client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: server
        run: npm install --ignore-scripts

      - name: Audit client prod deps (bloquant)
        working-directory: client
        run: |
          npm audit --json --omit=dev --audit-level=high > audit-prod.json 2>/dev/null || true
          node -e "
            const r = require('./audit-prod.json');
            Object.values(r.vulnerabilities || {}).forEach(v => {
              if (!['high','critical'].includes(v.severity)) return;
              const via = v.via || [];
              const direct = via.filter(x => typeof x === 'object');
              const indirect = via.filter(x => typeof x === 'string');
              const title = direct.length > 0
                ? direct.map(x => x.title).join(', ')
                : 'vulnerable via ' + indirect.join(', ');
              const url = direct[0]?.url ? ' - ' + direct[0].url : '';
              console.log(\`::error::[\${v.severity.toUpperCase()}] \${v.name} - \${title}\${url}\`);
            });
            if (r.metadata?.vulnerabilities?.high > 0 || r.metadata?.vulnerabilities?.critical > 0) process.exit(1);
          "

      - name: Audit server prod deps (bloquant)
        working-directory: server
        run: |
          npm audit --json --omit=dev --audit-level=high > audit-prod.json 2>/dev/null || true
          node -e "
            const r = require('./audit-prod.json');
            Object.values(r.vulnerabilities || {}).forEach(v => {
              if (!['high','critical'].includes(v.severity)) return;
              const via = v.via || [];
              const direct = via.filter(x => typeof x === 'object');
              const indirect = via.filter(x => typeof x === 'string');
              const title = direct.length > 0
                ? direct.map(x => x.title).join(', ')
                : 'vulnerable via ' + indirect.join(', ');
              const url = direct[0]?.url ? ' - ' + direct[0].url : '';
              console.log(\`::error::[\${v.severity.toUpperCase()}] \${v.name} - \${title}\${url}\`);
            });
            if (r.metadata?.vulnerabilities?.high > 0 || r.metadata?.vulnerabilities?.critical > 0) process.exit(1);
          "

      - name: Audit client dev deps (informatif)
        working-directory: client
        run: |
          npm audit --json --audit-level=high > audit.json 2>/dev/null || true
          node -e "
            const r = require('./audit.json');
            Object.values(r.vulnerabilities || {}).forEach(v => {
              if (!['high','critical'].includes(v.severity)) return;
              const via = v.via || [];
              const direct = via.filter(x => typeof x === 'object');
              const indirect = via.filter(x => typeof x === 'string');
              const title = direct.length > 0
                ? direct.map(x => x.title).join(', ')
                : 'vulnerable via ' + indirect.join(', ');
              const url = direct[0]?.url ? ' - ' + direct[0].url : '';
              console.log(\`::warning::[\${v.severity.toUpperCase()}] \${v.name} - \${title}\${url}\`);
            });
          " || true

      - name: Audit server dev deps (informatif)
        working-directory: server
        run: |
          npm audit --json --audit-level=high > audit.json 2>/dev/null || true
          node -e "
            const r = require('./audit.json');
            Object.values(r.vulnerabilities || {}).forEach(v => {
              if (!['high','critical'].includes(v.severity)) return;
              const via = v.via || [];
              const direct = via.filter(x => typeof x === 'object');
              const indirect = via.filter(x => typeof x === 'string');
              const title = direct.length > 0
                ? direct.map(x => x.title).join(', ')
                : 'vulnerable via ' + indirect.join(', ');
              const url = direct[0]?.url ? ' - ' + direct[0].url : '';
              console.log(\`::warning::[\${v.severity.toUpperCase()}] \${v.name} - \${title}\${url}\`);
            });
          " || true

      - name: Outdated client (informatif)
        working-directory: client
        run: |
          npm outdated --json > outdated.json 2>/dev/null || true
          node -e "
            const r = require('./outdated.json');
            Object.entries(r).forEach(([name, v]) => {
              console.log(\`::warning::[OUTDATED] \${name} - current: \${v.current} → latest: \${v.latest}\`);
            });
          " || true

      - name: Outdated server (informatif)
        working-directory: server
        run: |
          npm outdated --json > outdated.json 2>/dev/null || true
          node -e "
            const r = require('./outdated.json');
            Object.entries(r).forEach(([name, v]) => {
              console.log(\`::warning::[OUTDATED] \${name} - current: \${v.current} → latest: \${v.latest}\`);
            });
          " || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install client deps
        working-directory: client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: server
        run: npm install --ignore-scripts

      - name: Test client
        working-directory: client
        run: npm test -- --run

      - name: Test server
        working-directory: server
        run: npm test -- --run

  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Build images
        run: docker compose build

      - name: Save images
        run: |
          docker save p7-p7-client -o client-image.tar
          docker save p7-p7-server -o server-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: "*.tar"
          retention-days: 1
