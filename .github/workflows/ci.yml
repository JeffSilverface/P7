name: CI

on:
  push:
    branches: [main, staging]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  packages: write

jobs:
  audit:
    name: Packages Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install client deps
        working-directory: client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: server
        run: npm install --ignore-scripts

      - name: Audit client prod deps (bloquant)
        working-directory: client
        run: |
          npm audit --json --omit=dev --audit-level=high > audit-prod.json 2>/dev/null || true
          node -e "
            const r = require('./audit-prod.json');
            const m = r.metadata?.vulnerabilities || {};
            if (m.critical > 0 || m.high > 0)
              console.log(\`::error::Client prod deps - \${m.critical || 0} critical, \${m.high || 0} high vulnerabilities found - run 'npm audit' for details\`);
            if (m.critical > 0 || m.high > 0) process.exit(1);
          "

      - name: Audit server prod deps (bloquant)
        working-directory: server
        run: |
          npm audit --json --omit=dev --audit-level=high > audit-prod.json 2>/dev/null || true
          node -e "
            const r = require('./audit-prod.json');
            const m = r.metadata?.vulnerabilities || {};
            if (m.critical > 0 || m.high > 0)
              console.log(\`::error::Server prod deps - \${m.critical || 0} critical, \${m.high || 0} high vulnerabilities found - run 'npm audit' for details\`);
            if (m.critical > 0 || m.high > 0) process.exit(1);
          "

      - name: Audit client dev deps (informatif)
        working-directory: client
        run: |
          npm audit --json --audit-level=high > audit.json 2>/dev/null || true
          node -e "
            const r = require('./audit.json');
            const m = r.metadata?.vulnerabilities || {};
            if (m.critical > 0 || m.high > 0)
              console.log(\`::warning::Client dev deps - \${m.critical || 0} critical, \${m.high || 0} high vulnerabilities found - run 'npm audit' for details\`);
          " || true

      - name: Audit server dev deps (informatif)
        working-directory: server
        run: |
          npm audit --json --audit-level=high > audit.json 2>/dev/null || true
          node -e "
            const r = require('./audit.json');
            const m = r.metadata?.vulnerabilities || {};
            if (m.critical > 0 || m.high > 0)
              console.log(\`::warning::Server dev deps - \${m.critical || 0} critical, \${m.high || 0} high vulnerabilities found - run 'npm audit' for details\`);
          " || true

      - name: Outdated client (informatif)
        working-directory: client
        run: |
          npm outdated --json > outdated.json 2>/dev/null || true
          node -e "
            const r = require('./outdated.json');
            const count = Object.keys(r).length;
            if (count > 0)
              console.log(\`::warning::Client - \${count} outdated package(s) - run 'npm outdated' for details\`);
          " || true

      - name: Outdated server (informatif)
        working-directory: server
        run: |
          npm outdated --json > outdated.json 2>/dev/null || true
          node -e "
            const r = require('./outdated.json');
            const count = Object.keys(r).length;
            if (count > 0)
              console.log(\`::warning::Server - \${count} outdated package(s) - run 'npm outdated' for details\`);
          " || true

  test:
    name: Frontend/Backend Tests
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install client deps
        working-directory: client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: server
        run: npm install --ignore-scripts

      - name: Test client
        working-directory: client
        run: npm test -- --run

      - name: Test server
        working-directory: server
        run: npm test -- --run

  sonarcloud:
    name: SonarCloud Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Build images
        run: docker compose build --no-cache

      - name: Save images
        run: |
          docker save p7-p7-client -o client-image.tar
          docker save p7-p7-server -o server-image.tar

      - uses: actions/upload-artifact@v7
        with:
          name: docker-images
          path: "*.tar"
          retention-days: 1

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: docker-images

      - name: Load images
        run: |
          docker load -i client-image.tar
          docker load -i server-image.tar

      - name: Scan client image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: p7-p7-client
          exit-code: 1
          severity: CRITICAL,HIGH
          format: table

      - name: Scan server image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: p7-p7-server
          exit-code: 1
          severity: CRITICAL,HIGH
          format: table

  dast:
    name: Owasp ZAP scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: docker-images

      - name: Load images
        run: |
          docker load -i client-image.tar
          docker load -i server-image.tar

      - name: Start app
        run: |
          docker compose up -d
          sleep 20

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: http://localhost:4200
          fail_action: true
          allow_issue_writing: false
          rules_file_name: .zap/rules.tsv

      - name: Stop app
        if: always()
        run: docker compose down

  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: [trivy, dast]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata client
        id: meta-client
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/p7-client
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}

      - name: Docker metadata server
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/p7-server
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}

      - name: Build and push client image
        uses: docker/build-push-action@v7
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

  security-alert:
    name: Security Alert
    runs-on: ubuntu-latest
    needs: [audit, trivy, dast]
    if: ${{ always() && github.event_name == 'schedule' && (needs.audit.result == 'failure' || needs.trivy.result == 'failure' || needs.dast.result == 'failure') }}
    steps:
      - name: Open or update alert issue
        env:
          GH_TOKEN: ${{ github.token }}
          AUDIT_RESULT: ${{ needs.audit.result }}
          TRIVY_RESULT: ${{ needs.trivy.result }}
          DAST_RESULT: ${{ needs.dast.result }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Security scan failed"
          body="A scheduled security scan failed.

          Results:
          - Packages audit: ${AUDIT_RESULT}
          - Trivy image scan: ${TRIVY_RESULT}
          - OWASP ZAP scan: ${DAST_RESULT}

          Workflow run: ${RUN_URL}"

          issue_number="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"

          if [ -n "${issue_number}" ]; then
            gh issue comment "${issue_number}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
