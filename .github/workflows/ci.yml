name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install client deps
        working-directory: client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: server
        run: npm install --ignore-scripts

      - name: Audit client prod deps (bloquant)
        working-directory: client
        run: |
          npm audit --json --omit=dev --audit-level=high > audit-prod.json 2>/dev/null || true
          node -e "
            const r = require('./audit-prod.json');
            Object.values(r.vulnerabilities || {}).forEach(v => {
              if (['high','critical'].includes(v.severity)) {
                console.log(\`::error::[\${v.severity.toUpperCase()}] \${v.name} - \${v.title || v.via?.[0]?.title || 'vulnerability detected'}\`);
              }
            });
            if (r.metadata?.vulnerabilities?.high > 0 || r.metadata?.vulnerabilities?.critical > 0) process.exit(1);
          "

      - name: Audit server prod deps (bloquant)
        working-directory: server
        run: |
          npm audit --json --omit=dev --audit-level=high > audit-prod.json 2>/dev/null || true
          node -e "
            const r = require('./audit-prod.json');
            Object.values(r.vulnerabilities || {}).forEach(v => {
              if (['high','critical'].includes(v.severity)) {
                console.log(\`::error::[\${v.severity.toUpperCase()}] \${v.name} - \${v.title || v.via?.[0]?.title || 'vulnerability detected'}\`);
              }
            });
            if (r.metadata?.vulnerabilities?.high > 0 || r.metadata?.vulnerabilities?.critical > 0) process.exit(1);
          "

      - name: Audit client dev deps (informatif)
        working-directory: client
        run: |
          npm audit --json --audit-level=high > audit.json 2>/dev/null || true
          node -e "
            const r = require('./audit.json');
            Object.values(r.vulnerabilities || {}).forEach(v => {
              if (['high','critical'].includes(v.severity)) {
                console.log(\`::warning::[\${v.severity.toUpperCase()}] \${v.name} - \${v.title || v.via?.[0]?.title || 'vulnerability detected'}\`);
              }
            });
          " || true

      - name: Audit server dev deps (informatif)
        working-directory: server
        run: |
          npm audit --json --audit-level=high > audit.json 2>/dev/null || true
          node -e "
            const r = require('./audit.json');
            Object.values(r.vulnerabilities || {}).forEach(v => {
              if (['high','critical'].includes(v.severity)) {
                console.log(\`::warning::[\${v.severity.toUpperCase()}] \${v.name} - \${v.title || v.via?.[0]?.title || 'vulnerability detected'}\`);
              }
            });
          " || true

      - name: Outdated client (informatif)
        working-directory: client
        run: |
          npm outdated --json > outdated.json 2>/dev/null || true
          node -e "
            const r = require('./outdated.json');
            Object.entries(r).forEach(([name, v]) => {
              console.log(\`::warning::[OUTDATED] \${name} - current: \${v.current} → latest: \${v.latest}\`);
            });
          " || true

      - name: Outdated server (informatif)
        working-directory: server
        run: |
          npm outdated --json > outdated.json 2>/dev/null || true
          node -e "
            const r = require('./outdated.json');
            Object.entries(r).forEach(([name, v]) => {
              console.log(\`::warning::[OUTDATED] \${name} - current: \${v.current} → latest: \${v.latest}\`);
            });
          " || true
