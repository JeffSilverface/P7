name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install client deps
        working-directory: client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: server
        run: npm install --ignore-scripts

      - name: Audit client prod deps (bloquant)
        working-directory: client
        run: npm audit --omit=dev --audit-level=high

      - name: Audit server prod deps (bloquant)
        working-directory: server
        run: npm audit --omit=dev --audit-level=high

      - name: Audit client dev deps (informatif)
        working-directory: client
        run: npm audit --audit-level=high || true

      - name: Audit server dev deps (informatif)
        working-directory: server
        run: npm audit --audit-level=high || true

      - name: Outdated client (informatif)
        working-directory: client
        run: npm outdated || true

      - name: Outdated server (informatif)
        working-directory: server
        run: npm outdated || true
