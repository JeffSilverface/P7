server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    add_header Cache-Control $cache_control_header always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; form-action 'self'; frame-ancestors 'self'; base-uri 'self';" always;

    location /api/ {
        proxy_pass http://p7-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
