input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Extract log level as a dedicated field for Kibana filtering
  if [level] == "error" {
    mutate { add_tag => ["error"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "p7-logs-%{+YYYY.MM.dd}"
  }
}
