name: p7

services:
  p7-server:
    build:
      context: ./server
    environment:
      DATABASE_URL: file:/app/data/dev.db
      PORT: 8080
    volumes:
      - db_data:/app/data
    ports:
      - "8080:8080"

  p7-client:
    build:
      context: ./client
    ports:
      - "4200:80"
    depends_on:
      - p7-server

volumes:
  db_data:
